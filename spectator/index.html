<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Postmark — the told world (spectator)</title>
<style>
  html, body { margin: 0; background: #14171d; color: #e8e0cf; }
  #app:empty::before { content: "opening your eyes…"; display: block; padding: 40px;
    font: 16px Georgia, serif; color: #9a9280; font-style: italic; }
</style>
</head>
<body>
<!-- THE told-world viewer — one file, two habitats. All markup, styles, and logic
     live in viewer.mjs (the single source, shared with the site island). This shell
     only mounts it. Read-only by construction: the walk/stake verbs are never imported.
     The ALPHA banner + noindex are added by viewer.mjs and the island's wrapper. -->
<div id="app"></div>
<script type="module">
  import { mountViewer } from "/world-engine/spectator/viewer.mjs";
  mountViewer(document.getElementById("app"));
</script>
</body>
</html>
